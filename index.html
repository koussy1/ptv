<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Player Pro v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        :root { --bg: #0c0e1e; --card: #1c1f3a; --primary: #00e676; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* Navigation des écrans */
        .screen { display: none; height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }

        /* En-têtes */
        header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); font-weight: bold; }
        .logo { color: var(--primary); letter-spacing: 1px; }

        /* Écran Profils */
        .profile-container { padding: 20px; flex: 1; overflow-y: auto; text-align: center; }
        .profile-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        
        /* Grille Menu Principal */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-card { background: var(--card); padding: 30px 10px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .menu-card:active { border-color: var(--primary); transform: scale(0.95); }

        /* Lecteur & Liste */
        .player-layout { display: flex; flex-direction: column; height: 100%; }
        #video-container { background: #000; width: 100%; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; }
        .list-container { flex: 1; overflow-y: auto; background: #050505; }
        .category-tag { background: #222; color: var(--primary); padding: 5px 15px; font-size: 0.75rem; font-weight: bold; border-left: 3px solid var(--primary); }
        .stream-item { padding: 12px 15px; border-bottom: 1px solid #111; cursor: pointer; font-size: 0.9rem; }
        .stream-item:active { background: #1a1a1a; color: var(--primary); }

        /* Modale */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        
        /* Boutons */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; }
        .btn-add { background: transparent; color: #fff; border: 1px dashed #fff; width: 100%; margin-top: 20px; }
        .btn-back { background: transparent; color: #fff; font-size: 1.2rem; }

        @media (min-width: 768px) {
            .player-layout { flex-direction: row; }
            #video-container { flex: 1; aspect-ratio: auto; }
            .list-container { width: 350px; }
        }
    </style>
</head>
<body>

    <div id="screen-profiles" class="screen active">
        <header><div class="logo">K-PLAYER PRO</div></header>
        <div class="profile-container">
            <h2>Mes Listes M3U</h2>
            <div id="profile-render-area"></div>
            <button class="btn btn-add" onclick="toggleModal(true)">+ AJOUTER UN PROFIL</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <header>
            <button class="btn-back" onclick="changeScreen('screen-profiles')">←</button>
            <div id="current-profile-name">Profil</div>
            <div></div>
        </header>
        <div class="menu-grid">
            <div class="menu-card" onclick="openCategory('tv')">📺<br>LIVE TV</div>
            <div class="menu-card" onclick="openCategory('movie')">🎬<br>FILMS</div>
            <div class="menu-card" onclick="openCategory('series')">🍿<br>SÉRIES</div>
        </div>
    </div>

    <div id="screen-player" class="screen">
        <div class="player-layout">
            <div id="video-container">
                <video id="main-video" controls></video>
                <button style="position:absolute; top:10px; left:10px;" class="btn-back" onclick="changeScreen('screen-menu')">← Retour</button>
            </div>
            <div class="list-container" id="stream-list"></div>
        </div>
    </div>

    <div id="modal-add" class="modal">
        <div class="modal-content">
            <h3>Nouveau Profil</h3>
            <input type="text" id="in-name" placeholder="Nom du fournisseur">
            <input type="text" id="in-url" placeholder="URL du lien .m3u">
            <button class="btn btn-primary" onclick="addProfile()">SAUVEGARDER</button>
            <button class="btn" style="background:none; color:gray; width:100%; margin-top:10px;" onclick="toggleModal(false)">Annuler</button>
        </div>
    </div>

    <script>
        let db = { profiles: JSON.parse(localStorage.getItem('k_data') || '[]'), current: null, parsedData: null };
        const video = document.getElementById('main-video');
        let hls = new Hls();

        // Navigation
        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screen-player') { video.pause(); }
        }

        function toggleModal(show) {
            document.getElementById('modal-add').classList.toggle('show', show);
        }

        // Gestion Profils
        function renderProfiles() {
            const area = document.getElementById('profile-render-area');
            if(db.profiles.length === 0) area.innerHTML = "<p>Aucun profil trouvé</p>";
            else {
                area.innerHTML = db.profiles.map((p, i) => `
                    <div class="profile-item">
                        <div onclick="selectProfile(${i})" style="flex:1; cursor:pointer; text-align:left;">
                            <strong>${p.name}</strong>
                        </div>
                        <button onclick="deleteProfile(${i})" style="background:none; border:none; color:red;">🗑️</button>
                    </div>
                `).join('');
            }
        }

        function addProfile() {
            const name = document.getElementById('in-name').value;
            const url = document.getElementById('in-url').value;
            if(!name || !url) return alert("Champs vides");
            db.profiles.push({name, url});
            localStorage.setItem('k_data', JSON.stringify(db.profiles));
            toggleModal(false);
            renderProfiles();
        }

        function deleteProfile(i) {
            db.profiles.splice(i, 1);
            localStorage.setItem('k_data', JSON.stringify(db.profiles));
            renderProfiles();
        }

        // Logic M3U
        async function selectProfile(i) {
            const profile = db.profiles[i];
            document.getElementById('current-profile-name').innerText = profile.name;
            changeScreen('screen-menu');
            
            try {
                const res = await fetch(profile.url);
                const text = await res.text();
                db.parsedData = parseM3U(text);
            } catch (e) {
                alert("Erreur de chargement M3U (Vérifiez le lien ou le CORS)");
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let data = { tv: [], movie: [], series: [] };
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
